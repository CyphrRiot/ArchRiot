# ArchRiot Memory Management - Consolidated
# Fixes Linux aggressive caching + improves rsync/IO performance

# 1) Reserve 512MB for critical ops
vm.min_free_kbytes = 524288

# 2) VFS cache balance
vm.vfs_cache_pressure = 50

# 3) Prefer RAM over swap
vm.swappiness = 10

# 4) Dirty page handling for rsync
vm.dirty_background_bytes = 67108864
vm.dirty_bytes = 268435456

# 5) Disable zone reclaim
vm.zone_reclaim_mode = 0

# 6) OOM killer targets culprit
vm.oom_kill_allocating_task = 1

# 7) Memory compaction
vm.compaction_proactiveness = 20

# 8) Max map count
vm.max_map_count = 262144
